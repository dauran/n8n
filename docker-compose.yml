volumes:
  db_storage:
  n8n_storage:

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Paris}
      - TZ=${GENERIC_TIMEZONE:-Europe/Paris}
      - N8N_RUNNERS_ENABLED=true
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    image: docker:28-cli
    restart: unless-stopped
    working_dir: /app
    environment:
      - BACKUP_CRON=${BACKUP_CRON:-0 */6 * * *}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-n8n}
      - HOST_PROJECT_ROOT=${PWD}
      - TZ=${GENERIC_TIMEZONE:-Europe/Paris}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    entrypoint: ["/app/scripts/cron-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
